name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev tmux

      - name: Cargo check
        run: cargo check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Frontend tests
        run: npx vitest run

  notify-failure:
    name: Notify failure
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    if: ${{ github.event_name == 'push' && always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Post-merge CI failed on \`main\` for commit ${context.sha}.`,
              '',
              `Run: ${runUrl}`,
              `Pusher: @${context.actor}`,
              '',
              'Checks run:',
              '- Rust: `cargo check`, `cargo clippy --workspace --all-targets -- -D warnings`, `cargo test`',
              '- Frontend: `npm run type-check`, `npm run lint`, `npx vitest run`',
              '',
              'Please inspect the failed workflow run and fix main.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Post-merge CI failed on main (${sha})`,
              body
            });
